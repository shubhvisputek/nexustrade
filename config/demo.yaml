# NexusTrade — Hugging Face Spaces Demo Config
# ----------------------------------------------------------------------------
# Cloud-only configuration optimized for the free HF Spaces tier.
#   • No Ollama (model files are too large for the free container)
#   • No FinRL/FinGPT/Qlib heavy ML containers
#   • Yahoo Finance for free market data (no API key needed)
#   • Paper-trading broker only — never sends real orders
#   • LLM keys are bring-your-own (entered in the dashboard or via env vars)
#   • Falls back to deterministic momentum baseline when no key is set
# ----------------------------------------------------------------------------

log_level: INFO

llm:
  mode: cloud
  fast:
    provider: groq
    model: "llama-3.1-8b-instant"
    temperature: 0.3
    max_tokens: 1024
  deep:
    provider: anthropic
    model: "claude-haiku-4-5"
    temperature: 0.6
    max_tokens: 2048
  vision: null
  fallbacks:
    - provider: openai
      model: "gpt-4o-mini"
      temperature: 0.6
    - provider: openrouter
      model: "meta-llama/llama-3.1-8b-instruct:free"

agents:
  enabled:
    - name: warren_buffett
      source: ai_hedge_fund
      enabled: true
    - name: charlie_munger
      source: ai_hedge_fund
      enabled: true
    - name: technical_analyst
      source: ai_hedge_fund
      enabled: true
    - name: peter_lynch
      source: ai_hedge_fund
      enabled: false
    - name: cathie_wood
      source: ai_hedge_fund
      enabled: false
  aggregation_mode: weighted_confidence
  min_confidence: 0.4
  execution_mode: parallel

execution:
  mode: python
  brokers:
    - name: paper
      enabled: true
      markets: ["us_equity"]
      config:
        initial_cash: 100000.0
        slippage_pct: 0.001
        commission_pct: 0.0005

markets:
  us_equity:
    symbols: ["AAPL", "MSFT", "GOOGL", "TSLA", "NVDA"]
    data_provider: yahoo

risk:
  max_position_pct: 0.05
  sizing_model: fixed_fraction
  circuit_breaker:
    max_daily_loss_pct: 0.03
    max_consecutive_losses: 5
    max_open_positions: 10
    cooldown_minutes: 30

scheduler:
  analysis_interval: "1h"
  timeframes: ["1d"]

data:
  providers:
    - name: yahoo
      enabled: true
      priority: 1
  routing:
    us_equity: ["yahoo"]
  cache:
    enabled: true

# Notifications: leave channels empty for the demo (no spam to maintainer);
# users can patch via PUT /config or via env vars.
notifications:
  channels: []
  events:
    fill: ["telegram"]
    circuit_breaker: ["telegram", "email"]
    risk_blocked: []
    error: []

# Redis URL is read from REDIS_URL env var (set in HF Space secrets to your
# Upstash connection string). When missing, the event bus falls back to
# in-process queues — fine for a single-container demo.
