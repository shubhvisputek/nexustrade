# Indian market with Zerodha via OpenAlgo
log_level: INFO

llm:
  mode: hybrid
  fast:
    provider: ollama
    model: "llama3:8b"
    base_url: "http://localhost:11434"
    temperature: 0.3
    max_tokens: 2048
  deep:
    provider: anthropic
    model: "claude-sonnet-4-20250514"
    temperature: 0.7
    max_tokens: 4096

agents:
  enabled:
    - name: warren_buffett
      source: ai_hedge_fund
      enabled: true
    - name: technical_analyst
      source: ai_hedge_fund
      enabled: true
    - name: bull_bear_debate
      source: trading_agents_debate
      enabled: true
      config:
        rounds: 2
  aggregation_mode: weighted_confidence
  min_confidence: 0.65
  execution_mode: parallel

execution:
  mode: python
  brokers:
    - name: openalgo
      enabled: true
      markets: ["india_equity", "india_fno"]
      config:
        host: "http://localhost:5000"
        api_key: null  # Set via NEXUS__EXECUTION__BROKERS__0__CONFIG__API_KEY

markets:
  india_equity:
    symbols: ["RELIANCE", "TCS", "INFY", "HDFCBANK", "ICICIBANK"]
    data_provider: broker_data
    exchange: NSE

risk:
  max_position_pct: 0.04
  sizing_model: kelly
  circuit_breaker:
    max_daily_loss_pct: 0.02
    max_consecutive_losses: 3
    cooldown_minutes: 120

scheduler:
  analysis_interval: "1h"
  timeframes: ["15m", "1h", "1d"]

data:
  providers:
    - name: broker_data
      enabled: true
      priority: 1
      config:
        host: "http://localhost:5000"
    - name: openbb
      enabled: true
      priority: 5
  routing:
    india_equity: ["broker_data", "openbb"]
  cache:
    enabled: true
