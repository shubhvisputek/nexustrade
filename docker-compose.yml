services:
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - cpu-only
      - full

  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    profiles:
      - cpu-only
      - full

  data:
    build:
      context: .
      dockerfile: services/data/Dockerfile
    container_name: nexus-data
    ports:
      - "8081:8081"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    profiles:
      - cpu-only
      - full

  agents:
    build:
      context: .
      dockerfile: services/agent-engine/Dockerfile
    container_name: nexus-agents
    ports:
      - "8082:8082"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8082/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    profiles:
      - cpu-only
      - full

  llm:
    build:
      context: .
      dockerfile: services/agent-engine/Dockerfile
    container_name: nexus-llm
    ports:
      - "8083:8083"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8083/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    profiles:
      - cpu-only
      - full

  execution:
    build:
      context: .
      dockerfile: services/execution/Dockerfile
    container_name: nexus-execution
    ports:
      - "8084:8084"
      - "8888:8888"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8084/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    profiles:
      - cpu-only
      - full

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    container_name: nexus-web
    ports:
      - "8085:8085"
      - "8501:8501"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8085/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    profiles:
      - cpu-only
      - full

  finrl:
    build:
      context: .
      dockerfile: services/finrl/Dockerfile
    container_name: nexus-finrl
    ports:
      - "50051:50051"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import grpc; ch = grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    profiles:
      - cpu-only
      - full

  fingpt:
    build:
      context: .
      dockerfile: services/fingpt/Dockerfile
    container_name: nexus-fingpt
    ports:
      - "50052:50052"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import grpc; ch = grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(ch).result(timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    profiles:
      - cpu-only
      - full

  qlib:
    build:
      context: .
      dockerfile: services/qlib/Dockerfile
    container_name: nexus-qlib
    ports:
      - "50053:50053"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import grpc; ch = grpc.insecure_channel('localhost:50053'); grpc.channel_ready_future(ch).result(timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    profiles:
      - cpu-only
      - full

volumes:
  redis-data:
  ollama-data:
